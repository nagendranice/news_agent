name: News Digest
on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST (2:30 UTC)
    - cron: '30 12 * * *'  # 6:00 PM IST (12:30 UTC)
  workflow_dispatch:  # manual trigger for testing

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install langgraph langchain-groq feedparser python-dotenv
      - name: Create .env
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
          echo "EMAIL_RECEIVER=${{ secrets.EMAIL_RECEIVER }}" >> .env
      - name: Run agent
        run: python news_agent.py
